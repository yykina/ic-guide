site_name: IC自学指南
site_url: https://crys-chen.github.io/ic-guide/
site_author: Crys-Chen
site_description: >-
  IC自学指南

repo_name: ic-guide
repo_url: https://github.com/Crys-Chen/ic-guide

copyright: Copyright &copy; 2024-present <a href="https://github.com/Crys-Chen" target="_blank" rel="noopener noreferrer">Crys-Chen</a>

theme:
  name: material
  language: zh
  static_templates:
    - 404.html
  favicon: images/favicon.ico
  logo: images/logo.svg
  apple-touch-icon-precomposed: images/mobile_icon.png
  include_search_page: false
  search_index_only: true

  features:
    - header.autohide
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - content.code.annotate
    - content.tooltips
    - toc.follow

  palette:
    - scheme: default
      primary: custom
      accent: custom

  font:
    text: Noto Sans SC
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

  custom_dir: overrides

hooks:
  - hooks.py

markdown_extensions:
  - attr_list
  - md_in_html
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - git-revision-date:
  - minify:
      minify_html: false
      minify_css: true
      minify_js: true
