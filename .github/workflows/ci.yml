name: ci

on:
  push:
    branches:
      - master
      - main
  # 每小时刷新一次海外股 quotes.json（顺带重建并部署当前 main 内容）。
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v2
        with:
          python-version: 3.x

      - run: pip3 install -U -r requirements.txt
      - run: mkdocs build
      # Build PageFind index after mkdocs so it indexes the final HTML.
      # ubuntu-latest already has Node/npx; no extra setup needed.
      - run: npx pagefind --site site
      # 拉「非美海外股」(韩/台/日/澳/欧) 实时行情写入 site/quotes.json，供前端
      # stock-quote.js 同源读取（A股/港股/美股仍由浏览器实时取腾讯口）。
      # 失败不阻断部署：拉不到就让前端回退「行情↗」。
      - run: python3 scripts/fetch_foreign_quotes.py site/quotes.json || true
      # Push site/ to gh-pages branch.
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          ghp-import -n -p -f site
